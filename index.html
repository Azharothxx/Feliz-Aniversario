<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
    margin: 0;
    height: 100vh;
    height: 100svh; /* Altura real do celular */
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* Empurra os botões para a parte de baixo */
    align-items: center;
    padding-bottom: 40px; /* Distância dos botões para o fim da tela */
    
    /* Cor de fundo que combina com as bordas dessa imagem */
    background-color: #f8dce1; 

    /* Configuração da nova imagem */
    background-image: url('https://i.pinimg.com/236x/8f/b5/14/8fb51466c75dc6391165e222f459e8da.jpg');
    
    background-repeat: no-repeat;
    background-position: center 15%; /* Centraliza o desenho e sobe ele um pouco */
    background-size: contain; /* Garante que o desenho apareça INTEIRO sem cortes */
    
    overflow: hidden;
}
        

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilo dos Botões Glass */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px 20px;
            color: white;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        /* Telas de Conteúdo */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            background: white;
            color: black;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Animação Simples */
        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255,255,255,0.1);
            border-top: 8px solid #00f2fe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-btn" onclick="abrir('texto')">Leia esse texto</div>
        <div class="glass-btn" onclick="abrir('video')">Assista esse vídeo</div>
        <div class="glass-btn" onclick="abrir('animacao')">Veja essa animação</div>
    </div>

    <div id="tela-texto" class="overlay">
        <button class="close-btn" onclick="fechar()">Voltar</button>
        <h1>Título do Texto</h1>
        <p style="margin-top: 20px; font-size: 1.2rem;">Aqui você pode escrever o que quiser. O design é focado na leitura clara sobre o fundo escuro.</p>
    </div>

    <div id="tela-video" class="overlay">
    <button class="close-btn" onclick="fechar()">Voltar</button>
    <video id="meuVideo" width="90%" controls playsinline preload="auto" style="max-height: 80vh; border-radius: 20px;">
        <source src="./meu-video.mp4" type="video/mp4">
        Seu navegador não conseguiu carregar o arquivo meu-video.mp4.
    </video>
</div>

    <div id="tela-animacao" class="overlay">
    <button class="close-btn" onclick="fechar()">Voltar</button>
    
    <img src="https://media1.tenor.com/m/aldeLBO-RKwAAAAC/happy-birthday-hello-kitty.gif" 
         alt="Hello Kitty Animation" 
         style="width: 90%; max-width: 500px; border-radius: 20px; box-shadow: 0 0 20px rgba(255,105,180,0.5);">
    
    <p style="margin-top: 20px; font-weight: bold; font-size: 1.5rem; color: #ff69b4;">
        Feliz Aniversário! 🎂
    </p>
</div>

    <script>
        function abrir(tipo) {
            document.getElementById('tela-' + tipo).style.display = 'flex';
        }

        function fechar() {
            const telas = document.querySelectorAll('.overlay');
            telas.forEach(t => t.style.display = 'none');
            
            // Pausa o vídeo se ele estiver rodando
            const video = document.getElementById('meuVideo');
            video.pause();
        }
    </script>
</body>
</html>
