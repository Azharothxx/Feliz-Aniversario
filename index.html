<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Aniversário</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            height: 100svh; /* Altura real do telemóvel */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centraliza os botões */
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            
            /* Wallpaper ocupando a tela toda */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.2)), 
                        url('https://i.pinimg.com/236x/8f/b5/14/8fb51466c75dc6391165e222f459e8da.jpg');
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat;
            
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 100px; /* Ajuste para não tapar o rosto do desenho */
        }

        /* Estilo dos Botões Glass */
        .glass-btn {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            padding: 25px 20px;
            color: #ff4081; /* Rosa vibrante */
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            padding: 20px;
        }

        .close-btn {
            position: absolute;
            top: 40px;
            background: #ff69b4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
        }

        video, img {
            max-width: 90%;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-btn" onclick="abrir('texto')">Leia esse texto</div>
        <div class="glass-btn" onclick="abrir('video')">Assista esse vídeo</div>
        <div class="glass-btn" onclick="abrir('animacao')">Veja essa animação</div>
    </div>

    <div id="tela-texto" class="overlay">
        <button class="close-btn" onclick="fechar()">Voltar</button>
        <h1 style="color: #ff69b4;">Título</h1>
        <p style="margin-top: 20px;">Escreve aqui o teu texto!</p>
    </div>

    <div id="tela-video" class="overlay">
        <button class="close-btn" onclick="fechar()">Voltar</button>
        <video id="meuVideo" controls playsinline>
            <source src="./meu-video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="tela-animacao" class="overlay">
        <button class="close-btn" onclick="fechar()">Voltar</button>
        <img src="https://media1.tenor.com/m/aldeLBO-RKwAAAAC/happy-birthday-hello-kitty.gif">
        <p style="margin-top: 20px; font-weight: bold; font-size: 1.5rem; color: #ff69b4;">Feliz Aniversário!</p>
    </div>

    <script>
        function abrir(tipo) {
            document.getElementById('tela-' + tipo).style.display = 'flex';
            if(tipo === 'video') {
                const v = document.getElementById('meuVideo');
                v.load();
                v.play();
            }
        }

        function fechar() {
            document.querySelectorAll('.overlay').forEach(t => t.style.display = 'none');
            document.getElementById('meuVideo').pause();
        }
    </script>
</body>
</html>
